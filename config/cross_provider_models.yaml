# =============================================================================
# cross_provider_models.yaml
#
# 9-Model Cross-Provider Matrix Configuration for:
#   "DataPup: Engineering Reliable Text-to-SQL for Analytical Databases"
#
# Defines the 3x3 frontier model matrix:
#   Anthropic (Opus 4.7, Sonnet 4.6, Haiku 4.5)
#       x
#   OpenAI    (GPT-5.2, GPT-5, GPT-5 mini)
#       x
#   Google    (Gemini 2.5 Pro, Flash, Flash-Lite)
#
# DEFAULT TRANSPORT: `cli` — invoke via the public Claude / Codex / Gemini
# CLIs under the user's account. No API keys required by the evaluation
# framework itself; auth is handled inside each CLI's own login flow
# (`claude login`, `codex login`, `gemini auth login`).
#
# Override per-model with `transport: sdk` to fall back to the SDK + API
# key path (e.g., for higher-throughput batch runs on a server without
# interactive CLI auth).
# =============================================================================

# ---------------------------------------------------------------------------
# Default per-call settings
# ---------------------------------------------------------------------------
defaults:
  transport: cli            # cli | sdk
  max_tokens: 2048
  temperature: 0.0
  max_retries: 4
  retry_base_delay: 1.5

# ---------------------------------------------------------------------------
# SDK-only — environment variables consulted if transport=sdk
# ---------------------------------------------------------------------------
required_env_for_sdk:
  anthropic: ANTHROPIC_API_KEY
  openai:    OPENAI_API_KEY
  google:    GOOGLE_API_KEY

# ---------------------------------------------------------------------------
# Model matrix
#
# Each entry has:
#   provider:           anthropic | openai | google
#   model_id:           Provider's canonical model id (pinned)
#   transport:          (optional) cli | sdk — overrides defaults.transport
#   display_name:       Short label for tables/figures
#   tier:               flagship | mid | small
#   context_window:     Total context (input + output)
#   max_output:         Provider-supported output cap
#   input_cost_per_1m:  USD/1M input tokens
#   output_cost_per_1m: USD/1M output tokens
#   notes:              Paper-relevant notes
#
# IMPORTANT: model_id values below are the canonical names accepted by
# each provider's public CLI as of 2026-04. If your CLI rejects a model
# ("Model not found"), edit the entry to match what `claude --models`,
# `codex models`, or `gemini models list` reports on your host.
# ---------------------------------------------------------------------------
models:

  # ====================== ANTHROPIC ======================
  anthropic-opus-4-7:
    provider: anthropic
    model_id: claude-opus-4-7
    display_name: "Opus 4.7"
    tier: flagship
    context_window: 1000000
    max_output: 32000
    input_cost_per_1m: 5.00
    output_cost_per_1m: 25.00
    notes: "Anthropic frontier. Highest reasoning capability for complex JOINs and window functions."

  anthropic-sonnet-4-6:
    provider: anthropic
    model_id: claude-sonnet-4-6
    display_name: "Sonnet 4.6"
    tier: mid
    context_window: 200000
    max_output: 64000
    input_cost_per_1m: 3.00
    output_cost_per_1m: 15.00
    notes: "Anthropic mid-tier. Balance of cost and capability."

  anthropic-haiku-4-5:
    provider: anthropic
    model_id: claude-haiku-4-5-20251001
    display_name: "Haiku 4.5"
    tier: small
    context_window: 200000
    max_output: 8192
    input_cost_per_1m: 1.00
    output_cost_per_1m: 5.00
    notes: "Anthropic small-tier. Tests whether efficient models retain prompt-engineering benefits."

  # ====================== OPENAI ======================
  openai-gpt-5-2:
    provider: openai
    model_id: gpt-5.2
    display_name: "GPT-5.2"
    tier: flagship
    context_window: 400000
    max_output: 100000
    input_cost_per_1m: 1.75
    output_cost_per_1m: 14.00
    notes: "OpenAI frontier. Cross-family validation per R1 O1 / R3 O1."

  openai-gpt-5:
    provider: openai
    model_id: gpt-5
    display_name: "GPT-5"
    tier: mid
    context_window: 400000
    max_output: 100000
    input_cost_per_1m: 1.25
    output_cost_per_1m: 10.00
    notes: "OpenAI prior-generation flagship. Tests within-family generation robustness on OpenAI side."

  openai-gpt-5-mini:
    provider: openai
    model_id: gpt-5-mini
    display_name: "GPT-5 mini"
    tier: small
    context_window: 400000
    max_output: 100000
    input_cost_per_1m: 0.25
    output_cost_per_1m: 2.00
    notes: "OpenAI small-tier. Tests cost-efficiency tradeoff symmetric with Anthropic Haiku 4.5."

  # ====================== GOOGLE ======================
  google-gemini-2-5-pro:
    provider: google
    model_id: gemini-2.5-pro
    display_name: "Gemini 2.5 Pro"
    tier: flagship
    context_window: 2000000
    max_output: 65536
    input_cost_per_1m: 1.25
    output_cost_per_1m: 5.00
    notes: "Google frontier. Largest context window — relevant for ClickBench wide-table prompts."

  google-gemini-2-5-flash:
    provider: google
    model_id: gemini-2.5-flash
    display_name: "Gemini 2.5 Flash"
    tier: mid
    context_window: 1000000
    max_output: 65536
    input_cost_per_1m: 0.30
    output_cost_per_1m: 2.50
    notes: "Google mid-tier. High throughput, low latency."

  google-gemini-2-5-flash-lite:
    provider: google
    model_id: gemini-2.5-flash-lite
    display_name: "Gemini 2.5 Flash-Lite"
    tier: small
    context_window: 1000000
    max_output: 65536
    input_cost_per_1m: 0.10
    output_cost_per_1m: 0.40
    notes: "Google small-tier. Symmetric small-tier comparison."

# ---------------------------------------------------------------------------
# Tier groupings (for matrix-style experiments)
# ---------------------------------------------------------------------------
tiers:
  flagship:
    - anthropic-opus-4-7
    - openai-gpt-5-2
    - google-gemini-2-5-pro
  mid:
    - anthropic-sonnet-4-6
    - openai-gpt-5
    - google-gemini-2-5-flash
  small:
    - anthropic-haiku-4-5
    - openai-gpt-5-mini
    - google-gemini-2-5-flash-lite

# ---------------------------------------------------------------------------
# Provider rate limits (conservative defaults; raise after smoke-test)
# ---------------------------------------------------------------------------
rate_limits:
  anthropic:
    requests_per_minute: 50
    tokens_per_minute: 200000
    concurrent_requests: 4
  openai:
    requests_per_minute: 500
    tokens_per_minute: 800000
    concurrent_requests: 8
  google:
    requests_per_minute: 360
    tokens_per_minute: 4000000
    concurrent_requests: 8

# ---------------------------------------------------------------------------
# Estimated full-matrix cost (visibility, not a budget)
#
# Assumes 9 models x 206 queries x 1 best-config x ~3500 input tokens x ~500 output tokens
# = 1854 calls per model x 9 = 16,686 total calls
# Avg cost per call:
#   flagship: ~$0.025  (Opus dominant)
#   mid:      ~$0.012
#   small:    ~$0.003
# Per-tier cost (1854 calls each model x 3 models per tier):
#   flagship: ~$140
#   mid:      ~$67
#   small:    ~$17
# Full 9-model matrix: ~$224
#
# With Tier 1+2 baselines (DIN-SQL + MAC-SQL + CHESS) layered:
#   ~3x base cost: ~$675
#
# Negligible under no-budget policy.
# ---------------------------------------------------------------------------
cost_estimate:
  full_matrix_usd: 224
  with_baselines_usd: 675
  notes: "Visibility only. No budget cap per user instruction 2026-04-27."
